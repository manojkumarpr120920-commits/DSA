name: Organize DSA Solutions

on:
  push:
    branches:
      - main
    paths-ignore:
      - "Arrays/**"
      - "LinkedList/**"
      - "Trees/**"
      - "Graphs/**"
      - "DynamicProgramming/**"
      - "Stack/**"
      - "Queue/**"
      - "Heap/**"
      - "Recursion/**"
      - "Backtracking/**"
      - "BinarySearch/**"
      - "Sorting/**"
      - "Greedy/**"
      - "Trie/**"
      - "BitManipulation/**"
      - "SlidingWindow/**"
      - "TwoPointers/**"
      - "Math/**"
      - "Other/**"

permissions:
  contents: write

jobs:
  organize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run organizer
        run: python scripts/organize.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto organize DSA solutions"
            git push
          fi
